<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="headerApp">
        <button class="transparentButton noPadding" >
            <img src="res/logoHeaderApp.svg" alt="" style="width: 20px;">
        </button>
        
        <div class="searchBar">
            <p class="searchBarSlightlyTransparentTone">Buscar...</p>
            <img src="res/searchIconHeader.svg" alt="Busqueda" class="iconSearchHeader searchBarSlightlyTransparentTone" style="width: 20px;">
        </div>
        <button class="transparentButton noPadding centerIcon">
            <img src="res/bellIconHeader.svg" alt="" style="width: 26px;">
        </button>
    </div>
    <div class="content">
        <img class="loadingIndicator" src="res/spinner.svg" alt="">
    </div>
    <div class="navBarMain">
        <button  class="navBarButton">
            <div>
                <img class="navBarButton active" src="res/homeIcon.svg" alt="">
                <p class="navBarlabel active">Inicio</p>
            </div>
        </button>
        <button class="navBarButton">
            <div>
                <img class="navBarButton inactive" src="res/menuIcon.svg" alt="">
                <p class="navBarlabel inactive">Menú</p>
            </div>
        </button>
        <button class="navBarButton">
            <div>
                <img class="navBarButton inactive" src="res/cartIcon.svg" alt="">
                <p class="navBarlabel inactive">Carrito</p>
            </div>
        </button>
        <button class="navBarButton">
            <div>
                <img class="navBarButton inactive" src="res/profileIcon.svg" alt="">
                <p class="navBarlabel inactive">Perfil</p>
            </div>
        </button>
    </div>
</body>
</html>
